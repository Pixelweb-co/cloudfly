version: "3.8"

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    environment:
      TZ: America/Bogota
    networks:
      - app-net

  ia-scrum-team:
    build:
      context: ./ai_scrum_team
      dockerfile: Dockerfile
    container_name: ia_scrum_team
    restart: unless-stopped
    env_file:
      - ./ai_scrum_team/.env
    volumes:
      - ./ai_scrum_team:/app:ro
      - ./model_cache:/cache
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ia-scrum-team.rule=PathPrefix(`/ia_scrum_team` )"
      - "traefik.http.routers.ia-scrum-team.entrypoints=websecure"
      - "traefik.http.services.ia-scrum-team.loadbalancer.server.port=8000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  portainer_data:
    driver: local

networks:
  app-net:
    driver: bridge
