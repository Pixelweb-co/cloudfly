version: "3.8"

services:
  ia-scrum-team:
    build:
      context: ./ai_scrum_team
      dockerfile: Dockerfile
    container_name: ia_scrum_team
    restart: unless-stopped
    env_file:
      - ./ai_scrum_team/.env
    volumes:
      - ./ai_scrum_team:/app:ro
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ia-scrum-team.rule=PathPrefix(`/ia_scrum_team` )"
      - "traefik.http.routers.ia-scrum-team.entrypoints=websecure"
      - "traefik.http.services.ia-scrum-team.loadbalancer.server.port=8000"
      - "traefik.http.routers.ia-scrum-team-docs.rule=PathPrefix(`/ia_scrum_team/docs` )"
      - "traefik.http.routers.ia-scrum-team-docs.entrypoints=websecure"
      - "traefik.http.services.ia-scrum-team-docs.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
