version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cloudfly
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    networks:
      - app-net
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: cloudfly
    ports:
      - "3306:3306"
    networks:
      - app-net
networks:
  app-net:
    driver: bridge
