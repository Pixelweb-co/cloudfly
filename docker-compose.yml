version: '3.8'

services:
  marketing-agent:
    build:
      context: ./marketing_agent
    container_name: marketing-agent
    env_file:
      - .env
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-net

  marketing-worker:
    build:
      context: ./marketing_worker
    container_name: marketing-worker
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-net

networks:
  app-net:
    driver: bridge