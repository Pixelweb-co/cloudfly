services:
  lead-scrapper-google:
    build: .
    image: lead-scrapper-google
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    security_opt:
      - seccomp:unconfined
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
