spring:
  r2dbc:
    url: r2dbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:cloud_master}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:widowmaker}
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    consumer:
      group-id: marketing-worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

evolution:
  api:
    url: ${EVOLUTION_API_URL:http://evolution-api:8080}
    key: ${EVOLUTION_API_KEY:CAMBIA_ESTA_LLAVE_LARGA_Y_UNICA}

logging:
  level:
    root: INFO
    com.marketing.worker: DEBUG
