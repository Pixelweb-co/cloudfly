version: '3.8'
services:
  marketing-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketing-agent
    env_file:
      - .env
    environment:
      - FB_APP_ID=${FB_APP_ID}
      - FB_APP_SECRET=${FB_APP_SECRET}
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN}
      - FB_PAGE_ID=${FB_PAGE_ID}
    networks:
      - app-net
    depends_on:
      - kafka
      - db
networks:
  app-net:
    external: true
