# Traefik estático — Cloudfly producción
# Certificados: TLS-ALPN challenge en :443 (no depende del redirect en :80)

api:
  dashboard: true

log:
  level: INFO

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: cloudfly_app-net
    watch: true

certificatesResolvers:
  le:
    acme:
      email: web@cloudfly.com.co
      storage: /letsencrypt/acme.json
      tlsChallenge: {}

metrics:
  prometheus:
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
